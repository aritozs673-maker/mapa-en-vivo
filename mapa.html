<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mapa en vivo</title>

  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

  <!-- MAPBOX -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
  </style>
</head>
<body>
<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<script>
mapboxgl.accessToken = "pk.eyJ1IjoiYXJpMjAzMjU5MCIsImEiOiJjbW01bWVxMnQwOGY0MnFvbTkxenYyejJvIn0.3ew4xglzFTB6e8p-B6QoRA";

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/streets-v11',
    center: [-68.20959, -16.52698],
    zoom: 15
});

const marker = new mapboxgl.Marker().setLngLat([-68.20959, -16.52698]).addTo(map);

// ACTUALIZA DESDE TU API
async function actualizar() {
    try {
        const res = await fetch("http://192.168.0.16:3000/ubicacion");
        const data = await res.json();

        if (data) {
            const { lat, lon } = data;

            marker.setLngLat([lon, lat]);
            map.setCenter([lon, lat]);
        }
    } catch (e) {
        console.log("Error:", e);
    }
}

setInterval(actualizar, 2000);
</script>
 <script src="server.js"></script>
</body>
</html>
