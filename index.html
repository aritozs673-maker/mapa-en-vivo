<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa en tiempo real</title>

  <!-- MAPBOX CSS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <style>
    body, html { margin: 0; padding: 0; height: 100%; }
    #map { width: 100%; height: 100%; }
  </style>
</head>

<body>

<div id="map"></div>

<!-- MAPBOX JS (ANTES de usarlo) -->
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

  // Esperar que cargue todo
  window.addEventListener("load", function () {
  

    // MAPBOX
    mapboxgl.accessToken = "pk.eyJ1IjoiYXJpMjAzMjU5MCIsImEiOiJjbW01bWVxMnQwOGY0MnFvbTkxenYyejJvIn0.3ew4xglzFTB6e8p-B6QoRA";

    const map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/streets-v12",
      center: [-58.0, -34.0],
      zoom: 15
    });

    const marker = new mapboxgl.Marker()
      .setLngLat([-58.0, -34.0])
      .addTo(map);
    
   // =============================
// OBTENER UBICACIÓN Y GUARDAR EN SUPABASE
// =============================

if (navigator.geolocation) {

  navigator.geolocation.watchPosition(async function(position) {

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;
    const hora = new Date().toLocaleTimeString();

    // Mover marcador en tu mapa
    marker.setLngLat([lon, lat]);
    map.setCenter([lon, lat]);

    // GUARDAR EN SUPABASE
    const { error } = await supabaseClient
      .from("ubicaciones")
      .insert([
        { lat: lat, lon: lon, hora: hora }
      ]);

    if (error) {
      console.log("Error guardando:", error);
    } else {
      console.log("Ubicación guardada:", lat, lon);
    }

  }, function(error) {
    console.log("Error GPS:", error);
  });

}
    // SUPABASE
    const supabaseUrl = "https://qlyndvihlqiirztnqxim.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFseW5kdmlobHFpaXJ6dG5xeGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTc0OTUsImV4cCI6MjA4ODA3MzQ5NX0.t06Jz01XxqgSiOTnCNBi4_b79o_jz8cfi8-BfTQM_20";

    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function actualizarMapa() {
      const { data } = await supabaseClient
        .from("ubicaciones")
        .select("*")
        .order("id", { ascending: false })
        .limit(1);

      if (data && data.length > 0) {
        const lat = data[0].lat;
        const lon = data[0].lon;

        marker.setLngLat([lon, lat]);
        map.setCenter([lon, lat]);
      }
    }

    setInterval(actualizarMapa, 2000);

  });

</script>

</body>
</html>
